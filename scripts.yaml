sleep_mode_on_actions:
  alias: Sleep Mode On
  icon: mdi:sleep
  mode: single
  sequence:
    - data: {}
      target:
        entity_id:
          - light.kitchen_sink_overhead
          - light.kitchen_overhead
          - light.office_console_table_lamp
          - light.office_overhead
          - light.front_room_south_floor_lamp
          - switch.front_room_bookshelf_overhead
          - switch.front_room_table_light
          - switch.guest_bedroom_east_lamp_plug
          - light.upstairs_bedroom_overhead
          - light.upstairs_bathroom_lamp
          - light.hue_ambiance_candle_1
          - light.hue_ambiance_candle_2
          - light.kitchen_sink_counter_lamp
          - light.front_room_north_floor_lamp
          - light.downstairs_hallway_accent_light
          - light.downstairs_hallway_main_lights
          - light.laundry_room_main_lights
          - light.john_s_desk_lights
          - light.hue_ambiance_candle_1_2
          - light.guest_bedroom_sconces
          - light.office_desk_lamp
      action: homeassistant.turn_off
    - if:
        - condition: zone
          entity_id: person.annie
          zone: zone.home
      then:
        - data: {}
          target:
            entity_id: fan.bedroom
          action: fan.turn_on
        - data:
            oscillating: true
          target:
            entity_id: fan.bedroom
          action: fan.oscillate
        - data: {}
          target:
            entity_id: switch.bedroom_night_mode
          action: homeassistant.turn_on
        - data:
            percentage: 70
          target:
            entity_id: fan.bedroom
          action: fan.set_percentage
    - if:
        - condition: zone
          entity_id: person.john
          zone: zone.home
      then:
        - data: {}
          target:
            entity_id: fan.upstairs_bedroom
          action: fan.turn_on
        - data:
            oscillating: true
          target:
            entity_id: fan.upstairs_bedroom
          action: fan.oscillate
        - data: {}
          target:
            entity_id:
              - switch.upstairs_bedroom_night_mode
          action: homeassistant.turn_on
        - data:
            percentage: 80
          target:
            entity_id: fan.upstairs_bedroom
          action: fan.set_percentage
    - if:
        - condition: or
          conditions:
            - condition: zone
              entity_id: person.john
              zone: zone.home
            - condition: zone
              entity_id: person.annie
              zone: zone.home
      then:
        - type: turn_on
          device_id: fbcdacded1b9aad1e0980d446397eedc
          entity_id: 683d9331b2470c2855ad44080e051088
          domain: switch
    - type: turn_off
      device_id: 0f8c9c863e41509ae89eb58f99391579
      entity_id: 18215f9c4664cde8c1db82260612a06a
      domain: switch
    - type: turn_off
      device_id: 681946bb7e00682c4039f4454c4d0c81
      entity_id: efc6876edadc051dff55a9cbcdb10336
      domain: switch
    - if:
        - condition: state
          entity_id: light.back_entry_main_lights
          state: "on"
      then:
        - action: light.turn_off
          data: {}
          target:
            entity_id: light.back_entry_main_lights
    - action: light.turn_off
      target:
        entity_id: light.front_room_east_wall_lamp
      data: {}

sleep_mode_off_actions:
  alias: Sleep Mode Off
  icon: mdi:weather-sunset-up
  mode: single
  sequence:
    - data: {}
      target:
        entity_id:
          - light.office_console_table_lamp
          - light.front_room_south_floor_lamp
          - light.upstairs_bathroom_lamp
          - switch.guest_bedroom_east_lamp_plug
          - light.kitchen_sink_counter_lamp
          - light.hue_ambiance_candle_1_2
      action: homeassistant.turn_on
    - if:
        - condition: zone
          entity_id: person.john
          zone: zone.home
      then:
        - action: light.turn_on
          target:
            entity_id:
              - light.john_s_desk_lights
          data: {}
    - if:
        - condition: or
          conditions:
            - condition: zone
              entity_id: person.john
              zone: zone.home
            - condition: zone
              entity_id: person.annie
              zone: zone.home
      then:
        - data: {}
          target:
            entity_id:
              - light.kitchen_overhead
              - light.kitchen_sink_overhead
          action: homeassistant.turn_on
    - data:
        brightness: 255
      target:
        entity_id: light.front_room_north_floor_lamp
      action: light.turn_on
    - data: {}
      target:
        entity_id:
          - fan.upstairs_bedroom
          - fan.bedroom
      action: fan.turn_off
    - action: climate.set_hvac_mode
      target:
        entity_id:
          - climate.midea_ac
      data:
        hvac_mode: "off"
      continue_on_error: true
    - data: {}
      target:
        entity_id: switch.upstairs_bedroom_sound_machine
      action: switch.turn_off
    - action: light.turn_on
      data:
        brightness_pct: 50
      target:
        entity_id:
          - light.laundry_room_main_lights
          - light.downstairs_hallway_main_lights
    - action: light.turn_on
      data:
        brightness_pct: 5
      target:
        entity_id: light.downstairs_hallway_accent_light
    - action: light.turn_on
      target:
        entity_id: light.guest_bedroom_sconces
      data:
        brightness_pct: 50
    - action: light.turn_on
      target:
        entity_id: light.office_desk_lamp
      data:
        brightness_pct: 70
    - action: light.turn_on
      target:
        entity_id: light.front_room_east_wall_lamp
      data: {}
    - if:
        - condition: zone
          entity_id: person.john
          zone: zone.home
      then:
        - action: weather.get_forecasts
          target:
            entity_id: weather.downstairs
          data:
            type: daily
          response_variable: forecast
        - action: escpos_printer.print_text_utf8
          data:
            text: "GOOD MORNING, JOHN\n{{ now().strftime('%A, %B %-d') }}\n\nWEATHER\nNow:  {{ state_attr('weather.downstairs', 'temperature') | int }}\xb0F  {{ states('weather.downstairs') | replace('-', ' ') | title }}\nHigh: {{ forecast['weather.downstairs']['forecast'][0]['temperature'] | int }}\xb0F  Low: {{ forecast['weather.downstairs']['forecast'][0]['templow'] | int }}\xb0F\nWind: {{ forecast['weather.downstairs']['forecast'][0]['wind_speed'] | int }}mph\n\nOffice: {{ states('sensor.office_temperature') | float | round(1) }}\xb0F\n\n{{ now().strftime('%-I:%M %p') }}\n"
            cut: partial

renew_lets_encrypt_ssl_certificates:
  alias: Renew Let's Encrypt SSL Certificates
  icon: mdi:shield-lock
  mode: single
  sequence:
    - service: hassio.addon_start
      data:
        addon: core_letsencrypt
    - delay:
        hours: 0
        minutes: 1
        seconds: 0
        milliseconds: 0
    - service: shell_command.copy_ssl_files
      data: {}
    - service: hassio.addon_restart
      data:
        addon: core_nginx_proxy
